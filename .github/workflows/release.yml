name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: macos-latest
            os-name: macOS-Silicon
            target: aarch64-apple-darwin
            bin: tempest_ai
          - os: macos-13
            os-name: macOS-Intel
            target: x86_64-apple-darwin
            bin: tempest_ai
          - os: ubuntu-latest
            os-name: Linux-x86_64
            target: x86_64-unknown-linux-gnu
            bin: tempest_ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Prepare Binary
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czf ../../../tempest_ai-${{ github.ref_name }}-${{ matrix.platform.os-name }}.tar.gz ${{ matrix.platform.bin }}

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: tempest_ai-${{ github.ref_name }}-${{ matrix.platform.os-name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
