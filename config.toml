# Tempest AI Configuration
# Copy this file to ~/.config/tempest_ai/config.toml to customize

# The Ollama model to use (can also be set via --model or OLLAMA_MODEL env var)
model = "qwen2.5-coder:7b"

# Path to conversation history file (relative to CWD or absolute)
history_path = "history.json"

# Path to the SQLite fleet database
db_path = "~/fleet.db"

# Enable encrypted conversation history (requires passphrase on startup)
encrypt_history = false

# MLX Native Engine Configuration
# mlx_quant: "Q4_K_M" (Fast, low RAM) or "Q8_0" (High quality, ~10GB RAM)
mlx_quant = "Q4_K_M"
