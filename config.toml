# Tempest AI Configuration
# This file is used to customize the behavior of the Tempest AI agent.

# ==========================================
# 🌊 OLLAMA 3-TIER STACK (Automatic)
# ==========================================
# The agent will automatically cycle through these models based on the phase.
planner_model = "deepseek-r1:8b"
executor_model = "qwen2.5-coder:7b"
verifier_model = "deepseek-r1:7b"

# ==========================================
# ⚡ MLX MODEL OPTIONS (Manual Switching)
# ==========================================
# The model currently loaded in memory for the MLX backend.
# Use /switch <name> in the TUI to hot-swap between presets.
mlx_model = "bartowski/deepseek-ai_DeepSeek-R1-0528-Qwen3-8B-GGUF"
mlx_quant = "Q6_K"

# Available MLX presets
[mlx_presets.ministral]
repo = "bartowski/Ministral-8B-Instruct-2410-GGUF"
quant = "Q8_0"
[mlx_presets.r1]
repo = "bartowski/deepseek-ai_DeepSeek-R1-0528-Qwen3-8B-GGUF"
quant = "Q6_K"

[mlx_presets.qwen_big]
repo = "bartowski/Qwen2.5-Coder-7B-Instruct-GGUF"
quant = "Q8_0"

[mlx_presets.qwen_small]
repo = "bartowski/Qwen2.5-Coder-7B-Instruct-GGUF"
quant = "Q4_K_M"

# ==========================================
# ⚙️ SAMPLING PARAMETERS
# ==========================================
# Fine-tune the creativity and stiffness of the models.
temp_planning = 0.05
temp_execution = 0.25
top_p_planning = 0.95
top_p_execution = 0.92
repeat_penalty_planning = 1.18
repeat_penalty_execution = 1.12
ctx_planning = 16384
ctx_execution = 16384

# ==========================================
# ⚡ MLX SAMPLING PARAMETERS
# ==========================================
# MLX models (especially 7B distilled) require higher temperatures to trigger reasoning.
mlx_temp_planning = 0.6
mlx_temp_execution = 0.2
mlx_top_p_planning = 0.95
mlx_top_p_execution = 0.9
mlx_repeat_penalty_planning = 1.05
mlx_repeat_penalty_execution = 1.05

# ==========================================
# 🧹 BASE SETTINGS
# ==========================================
model = "qwen2.5-coder:7b"
sub_agent_model = "llama3.2:1b"
history_path = "history.json"
db_path = "~/fleet.db"
encrypt_history = false
