[package]
name = "tempest_ai"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
ollama-rs = { version = "0.2.1" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
colored = "2.1"
rustyline = "14.0"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"], default-features = false }
scraper = "0.20"
html2text = "0.12"
urlencoding = "2.1"
shellexpand = "3.1.2"
sysinfo = "0.38.4"
rusqlite = { version = "0.39.0", features = ["bundled"] }
notify = "8.2.0"

